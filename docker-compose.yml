x-app-env: &app-env
  REDIS_HOST: redis
  MONGO_HOST: mongodb
  MONGO_REPLICA_SET: rs0
  CRAWLER_CONTENT_STORE: s3
  S3_BUCKET: crawler-html
  S3_ENDPOINT_URL: http://minio:9000
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_REGION: us-east-1

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongodb:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init:/docker/mongo-init:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "/docker/mongo-init/01-init-replica.js"]
      interval: 5s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  crawler-worker:
    build: .
    command: ["python", "src/v3/worker_v3.py", "--max-pages", "3000", "--idle-timeout", "12000", "--batch-size", "5"]
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  streaming-indexer:
    build: .
    command: ["python", "streaming_indexer.py", "--sleep", "1", "--max-events", "50"]
    environment:
      <<: *app-env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  pagerank-worker:
    build: .
    command: ["python", "pagerank_worker.py", "--sleep", "1", "--max-events", "25", "--max-pushes", "200"]
    environment:
      <<: *app-env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  search-api:
    build: .
    command: ["python", "-m", "uvicorn", "search.search_api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  seed:
    build: .
    command: ["python", "scripts/seed_from_file.py", "--file", "seed_urls.txt"]
    profiles: ["tools"]
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  mongo_data:
  minio_data:
